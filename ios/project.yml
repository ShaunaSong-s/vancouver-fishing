name: FishingAssistant
options:
  bundleIdPrefix: com.vancouver.fishing
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  FishingAssistant:
    type: application
    platform: iOS
    sources:
      - path: FishingAssistant
    settings:
      base:
        INFOPLIST_FILE: FishingAssistant/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.vancouver.fishing.assistant
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: FishingAssistant/Info.plist
      properties:
        CFBundleDisplayName: 钓鱼助手
        CFBundleName: FishingAssistant
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocationWhenInUseUsageDescription: "需要您的位置来推荐附近钓点和计算航线"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
